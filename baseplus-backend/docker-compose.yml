name: canal-de-etica-registros

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-canal_de_etica_registros}
      POSTGRES_USER: ${DB_USER:-canal_de_etica}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Defina DB_PASSWORD para executar a stack Docker}
    volumes:
      - canal_de_etica_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-canal_de_etica} -d ${DB_NAME:-canal_de_etica_registros}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - canal_de_etica_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: canal-de-etica-registros-backend:${CANAL_DE_ETICA_TAG:-local}
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-canal_de_etica_registros}
      DB_USER: ${DB_USER:-canal_de_etica}
      DB_PASSWORD: ${DB_PASSWORD:?Defina DB_PASSWORD para executar a stack Docker}
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-canal_de_etica_registros}
      JWT_SECRET: ${JWT_SECRET:?Defina JWT_SECRET para executar a stack Docker}
      UPLOAD_DIR: /app/uploads
      BASEPLUS_CORS_ALLOWED_ORIGINS: ${BASEPLUS_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      BASEPLUS_BOOTSTRAP_ADMIN_ENABLED: ${BASEPLUS_BOOTSTRAP_ADMIN_ENABLED:-false}
      BASEPLUS_BOOTSTRAP_ADMIN_NAME: ${BASEPLUS_BOOTSTRAP_ADMIN_NAME:-}
      BASEPLUS_BOOTSTRAP_ADMIN_EMAIL: ${BASEPLUS_BOOTSTRAP_ADMIN_EMAIL:-}
      BASEPLUS_BOOTSTRAP_ADMIN_PASSWORD: ${BASEPLUS_BOOTSTRAP_ADMIN_PASSWORD:-}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8080}:8080"
    volumes:
      - canal_de_etica_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - canal_de_etica_network

  frontend:
    build:
      context: ../baseplus-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    image: canal-de-etica-registros-frontend:${CANAL_DE_ETICA_TAG:-local}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - canal_de_etica_network

volumes:
  canal_de_etica_postgres_data:
  canal_de_etica_uploads:

networks:
  canal_de_etica_network:
    driver: bridge
