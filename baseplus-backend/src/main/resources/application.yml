spring:
  application:
    name: canal-de-etica-registros-backend
  profiles:
    default: dev
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB
  flyway:
    enabled: false

jwt:
  secret: ${JWT_SECRET}

server:
  port: 8080

baseplus:
  cors:
    allowed-origins: ${BASEPLUS_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  upload:
    directory: ${UPLOAD_DIR:uploads}
